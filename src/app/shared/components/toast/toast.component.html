<div class="toast-container">
  @for (toast of toasts(); track toast.id) {
    <div class="toast" [ngClass]="['toast--' + toast.type]" (click)="remove(toast.id)">
      <div class="toast__icon">
        <i [ngClass]="getIcon(toast.type)"></i>
      </div>
      <div class="toast__content">
        <p class="toast__message">{{ toast.message }}</p>
      </div>
      <button class="toast__close" (click)="$event.stopPropagation(); remove(toast.id)">
        &times;
      </button>
      <div class="toast__progress" [style.animation-duration.ms]="toast.duration || 3000"></div>
    </div>
  }
</div>
