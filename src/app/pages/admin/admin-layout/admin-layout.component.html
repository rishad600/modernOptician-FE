<div class="dashboard">
  <!-- Mobile Header -->
  <header class="dashboard__mobile-header">
    <div class="dashboard__mobile-user">
      <div class="dashboard__avatar small">
        <img *ngIf="adminAvatar" [src]="adminAvatar" [alt]="adminName">
        <div *ngIf="!adminAvatar" class="avatar-placeholder small">{{ adminName.charAt(0) }}</div>
      </div>
      <span>{{ adminName }}</span>
    </div>
    <button class="dashboard__mobile-toggle" (click)="isMobileMenuOpen = !isMobileMenuOpen" [class.is-open]="isMobileMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- Mobile Nav Overlay -->
  <nav class="dashboard__mobile-nav" [class.is-open]="isMobileMenuOpen">
    <a *ngFor="let item of navItems" 
       [routerLink]="item.route" 
       routerLinkActive="is-active"
       (click)="isMobileMenuOpen = false"
       class="dashboard__mobile-nav-item">
      <span>{{ item.label }}</span>
    </a>
    <a (click)="confirmLogout()" class="dashboard__mobile-nav-item logout" style="cursor: pointer;">Logout</a>
  </nav>

  <!-- Sidebar -->
  <aside class="dashboard__sidebar">
    <div class="dashboard__user">
      <div class="dashboard__avatar">
        <img *ngIf="adminAvatar" [src]="adminAvatar" [alt]="adminName">
        <div *ngIf="!adminAvatar" class="avatar-placeholder">{{ adminName.charAt(0) }}</div>
      </div>
      <div class="dashboard__user-info">
        <h3>{{ adminName }}</h3>
        <p>{{ adminEmail }}</p>
      </div>
    </div>

    <nav class="dashboard__nav">
      <a *ngFor="let item of navItems" 
         [routerLink]="item.route" 
         routerLinkActive="is-active"
         class="dashboard__nav-item">
        <i class="icon-{{item.icon}}"></i>
        <span>{{ item.label }}</span>
      </a>
      <a (click)="confirmLogout()" class="dashboard__nav-item logout" style="cursor: pointer;">
        <i class="icon-logout"></i>
        <span>Logout</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="dashboard__content">
    <router-outlet></router-outlet>
  </main>

  <!-- Logout Confirmation Dialog -->
  <div class="logout-overlay" *ngIf="showLogoutDialog" (click)="cancelLogout()">
    <div class="logout-dialog" (click)="$event.stopPropagation()">
      <div class="logout-dialog__icon">
        <i class="icon-logout"></i>
      </div>
      <h2 class="logout-dialog__title">Sign Out?</h2>
      <p class="logout-dialog__message">You'll be signed out of your admin session. Any unsaved changes will be lost.</p>
      <div class="logout-dialog__actions">
        <button class="btn-cancel" (click)="cancelLogout()">Cancel</button>
        <button class="btn-confirm" (click)="logout()">Yes, Sign Out</button>
      </div>
    </div>
  </div>
</div>
