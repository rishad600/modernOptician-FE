<div class="edit-course">
  <header class="admin-header">
    <div class="admin-header__content">
      <nav class="breadcrumb">
        <a routerLink="/admin/courses">Courses</a>
        <span>/</span>
        <span class="current">{{ isEditMode ? 'Edit Course' : 'Create New Course' }}</span>
      </nav>
      <h1 class="admin-header__title">{{ isEditMode ? 'Edit Course' : 'Add New Course' }}</h1>
    </div>
  </header>

  <form [formGroup] = "courseForm" (ngSubmit) = "onSubmit()" class="form-container">
    <div class="form-grid">
      <!-- Left Column: Basic Info -->
      <div class="form-section">
        <h2 class="section-title">Basic Information</h2>
        
        <div class="form-group">
          <label for="title">Course Title</label>
          <input id="title" type="text" formControlName="title" placeholder="e.g. Advanced Optometry 101">
          <span class="error" *ngIf="courseForm.get('title')?.touched && courseForm.get('title')?.invalid">
            Title is required (min 5 characters).
          </span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="instructor">Instructor Name</label>
            <input id="instructor" type="text" formControlName="instructor">
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" formControlName="status">
              <option value="Draft">Draft</option>
              <option value="Published">Published</option>
              <option value="Archived">Archived</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="description">Course Description</label>
          <textarea id="description" formControlName="description" rows="5"></textarea>
        </div>

        <!-- Curriculum Section -->
        <div class="curriculum-editor">
          <div class="curriculum-editor__header">
            <h2 class="section-title">Curriculum</h2>
            <button type="button" class="btn-secondary small" (click)="addCurriculumItem()">+ Add Lesson</button>
          </div>
          
          <div class="curriculum-list" formArrayName="curriculum">
            <div *ngFor="let item of curriculum.controls; let i = index" [formGroupName]="i" class="curriculum-item-form">
              <div class="curriculum-item-form__drag">:::</div>
              <div class="curriculum-item-form__main">
                <div class="form-row">
                  <div class="form-group">
                    <label>Lesson Title</label>
                    <input type="text" formControlName="title" placeholder="e.g. Intro to Optometry">
                  </div>
                  <div class="form-group compact">
                    <label>Duration</label>
                    <input type="text" formControlName="duration" placeholder="10m">
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group compact">
                    <label>Type</label>
                    <select formControlName="type">
                      <option value="video">🎥 Video</option>
                      <option value="document">📄 Document</option>
                    </select>
                  </div>
                  <div class="form-group file-upload-group">
                    <label>Resource (Video/Doc)</label>
                    <div class="file-upload-wrapper">
                      <input type="text" formControlName="file" placeholder="Upload file or enter URL" class="file-path-input">
                      <button type="button" class="btn-upload-trigger" (click)="fileInput.click()">
                        <i class="icon-upload"></i>
                        <span>Browse</span>
                      </button>
                      <input #fileInput type="file" (change)="onFileSelected($event, i)" style="display: none">
                    </div>
                  </div>
                </div>
              </div>
              <button type="button" class="btn-delete-small" (click)="removeCurriculumItem(i)">
                <i class="icon-trash"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Testimonials Section -->
        <div class="testimonials-editor">
          <div class="testimonials-editor__header">
            <h2 class="section-title">Student Feedbacks</h2>
            <button type="button" class="btn-secondary small" (click)="addTestimonial()">+ Add Feedback</button>
          </div>
          
          <div class="testimonials-list" formArrayName="testimonials">
            <div *ngFor="let t of testimonials.controls; let i = index" [formGroupName]="i" class="testimonial-item-form">
              <div class="form-row">
                <div class="form-group">
                  <label>Author</label>
                  <input type="text" formControlName="author">
                </div>
                <div class="form-group">
                  <label>Role</label>
                  <input type="text" formControlName="role">
                </div>
              </div>
              <div class="form-group">
                <label>Comment</label>
                <textarea formControlName="comment" rows="2"></textarea>
              </div>
              <button type="button" class="btn-delete-small abs" (click)="removeTestimonial(i)">
                <i class="icon-trash"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Meta & Media -->
      <div class="form-aside">
        <div class="form-section">
          <h2 class="section-title">Course Meta</h2>
          
          <div class="form-group">
            <label for="price">Price (₹)</label>
            <input id="price" type="text" formControlName="price">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="duration">Duration</label>
              <input id="duration" type="text" formControlName="duration" placeholder="e.g. 10h 30m">
            </div>
            <div class="form-group">
              <label for="lessons">Lessons</label>
              <input id="lessons" type="number" formControlName="lessons">
            </div>
          </div>
        </div>

        <div class="form-section thumbnail-section">
          <h2 class="section-title">Course Thumbnail</h2>
          <div class="thumbnail-preview">
            <img [src]="courseForm.get('image')?.value" alt="Preview">
            <div class="upload-overlay">
              <button type="button" class="btn-secondary small" (click)="thumbInput.click()">Change Image</button>
            </div>
            <input #thumbInput type="file" (change)="onThumbnailSelected($event)" style="display: none" accept="image/*">
          </div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-outline" routerLink="/admin/courses">Cancel</button>
      <button type="submit" class="btn-primary">{{ isEditMode ? 'Update Course' : 'Create Course' }}</button>
    </div>
  </form>
</div>
