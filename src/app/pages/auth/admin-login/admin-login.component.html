<div class="auth-card">
  <div class="auth-card__header">
    <h2 class="auth-card__title">Admin Portal</h2>
    <p class="auth-card__subtitle">Secure access for system administrators and staff.</p>
  </div>

  <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="auth-form__group">
      <label class="auth-form__label">Admin Username</label>
      <input type="text" formControlName="email" class="auth-form__input" placeholder="Username or Email">
    </div>

    <div class="auth-form__group">
      <div class="auth-form__label-row">
        <label class="auth-form__label">Password</label>
        <a href="#" class="auth-form__forgot">Forgot?</a>
      </div>
      <div class="auth-form__input-wrapper">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="password" class="auth-form__input"
          placeholder="Password">
        <button type="button" class="auth-form__toggle-password" (click)="togglePassword()">
          <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
            </path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="auth-form__submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Logging in...' : 'Login
      to Dashboard' }}</button>

    <div class="auth-form__footer">
      Student access? <a routerLink="/auth/login">Return to Login</a>
    </div>
  </form>
</div>
