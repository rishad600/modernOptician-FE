<div class="auth-card">
  <div class="auth-card__header">
    <h2 class="auth-card__title">Welcome Back</h2>
    <p class="auth-card__subtitle">Continue your path to optician mastery and career advancement.</p>
  </div>

  <form class="auth-form">
    <div class="auth-form__group">
      <label class="auth-form__label">Email</label>
      <input type="email" class="auth-form__input" placeholder="Email">
    </div>

    <div class="auth-form__group">
      <div class="auth-form__label-row">
        <label class="auth-form__label">Password</label>
        <a href="#" class="auth-form__forgot">Forgot Password?</a>
      </div>
      <div class="auth-form__input-wrapper">
        <input type="password" class="auth-form__input" placeholder="Password">
        <button type="button" class="auth-form__toggle-password">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
    </div>

    <div class="auth-form__divider">
      <span>Or with</span>
    </div>

    <div class="auth-form__social">
      <button type="button" class="auth-form__social-btn">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
        Sign In with Google
      </button>
      <button type="button" class="auth-form__social-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.05 20.28c-.96.95-2.04 1.44-3.23 1.44-1.23 0-2.3-.43-3.2-1.3-.9-.87-1.35-1.92-1.35-3.15 0-1.22.45-2.27 1.35-3.14.9-.87 1.97-1.3 3.2-1.3 1.19 0 2.27.49 3.23 1.44l1.45-1.45c-1.36-1.36-2.92-2.04-4.68-2.04-1.74 0-3.23.61-4.48 1.83-1.25 1.22-1.87 2.7-1.87 4.45 0 1.74.62 3.22 1.87 4.45 1.25 1.22 2.74 1.83 4.48 1.83 1.76 0 3.32-.68 4.68-2.04l-1.45-1.45z"/>
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8z"/>
        </svg>
        Sign In with Apple
      </button>
    </div>

    <button type="submit" class="auth-form__submit">Sign In</button>

    <div class="auth-form__footer">
      Don't have an account? <a routerLink="/auth/signup">Sign Up</a>
    </div>
  </form>
</div>
