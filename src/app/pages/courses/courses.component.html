<div class="courses-page">
  <!-- 1. Filter Section -->
  <section class="filter-section">
    <div class="container">
      <div class="filter-bar">
        <div class="search-box">
          <input 
            type="text" 
            placeholder="Search for a course..." 
            (input)="onSearch($event)"
            class="search-input"
          >
        </div>

        <!-- Hiding category filters for now -->
        <!-- <div class="category-filters">
          <button 
            [class.active]="selectedCategory === 'all'" 
            (click)="filterByCategory('all')"
            class="filter-btn"
          >
            All Courses
          </button>
          ...
        </div> -->

        <div class="sort-box">
          <span class="sort-label">Sort by:</span>
          <select class="sort-select" (change)="onSort($event)">
            <option value="latest">Latest</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <!-- 3. Listing Section -->
  <section class="listing-section">
    <div class="container">

      <!-- Loading State -->
      <div class="loading-state" *ngIf="isLoading">
        <div class="spinner"></div>
        <p>Loading courses...</p>
      </div>

      <!-- Error State -->
      <div class="error-state" *ngIf="error && !isLoading">
        <p>{{ error }}</p>
        <button class="btn-outline" (click)="fetchCourses()">Try Again</button>
      </div>

      <!-- Results -->
      <ng-container *ngIf="!isLoading && !error">
        <div class="results-info" *ngIf="filteredCourses.length > 0">
          Showing {{ filteredCourses.length }} course{{ filteredCourses.length !== 1 ? 's' : '' }}
        </div>

        <div class="courses-grid" *ngIf="filteredCourses.length > 0">
          <app-course-card 
            *ngFor="let course of filteredCourses" 
            [plan]="course"
          ></app-course-card>
        </div>

        <!-- No Results State -->
        <div class="no-results" *ngIf="filteredCourses.length === 0">
          <div class="no-results__content">
            <h3>No courses found</h3>
            <p>We couldn't find any courses matching your search or filter. Try a different keyword or category.</p>
            <button class="btn-outline" (click)="filterByCategory('all')">View All Courses</button>
          </div>
        </div>
      </ng-container>

    </div>
  </section>
</div>
