<div class="my-courses">
  <div class="dashboard-header">
    <h1>My Purchased Courses</h1>
    <p>Continue your learning journey where you left off.</p>
  </div>

  <div class="courses-grid">
    <div *ngFor="let course of courses" class="course-card">
      <div class="course-card__image">
        <img [src]="course.image" [alt]="course.title">
        <div class="course-card__badge">In Progress</div>
      </div>
      <div class="course-card__content">
        <p class="course-card__instructor">{{ course.instructor }}</p>
        <h3 class="course-card__title">{{ course.title }}</h3>
        
        <div class="course-card__progress">
          <div class="progress-info">
            <span>Progress</span>
            <span>{{ course.progress }}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-bar__fill" [style.width]="course.progress + '%'"></div>
          </div>
        </div>

        <div class="course-card__footer">
          <span class="last-accessed">Last: {{ course.lastAccessed }}</span>
          <button class="btn-primary btn-sm">Resume</button>
        </div>
      </div>
    </div>
  </div>
</div>
